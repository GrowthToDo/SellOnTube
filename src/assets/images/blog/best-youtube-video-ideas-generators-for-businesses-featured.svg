<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030620"/>
      <stop offset="100%" stop-color="#0a1540"/>
    </linearGradient>
    <linearGradient id="gradText" x1="70" y1="0" x2="480" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="fadeLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#030620" stop-opacity="1"/>
      <stop offset="28%" stop-color="#030620" stop-opacity="0.6"/>
      <stop offset="58%" stop-color="#030620" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="55%" stop-color="#030620" stop-opacity="0"/>
      <stop offset="100%" stop-color="#030620" stop-opacity="0.9"/>
    </linearGradient>
    <clipPath id="photoClip">
      <rect x="660" y="0" width="540" height="630"/>
    </clipPath>
    <clipPath id="textClip">
      <rect x="0" y="0" width="655" height="630"/>
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g opacity="0.05" fill="#ffffff">
    <circle cx="110" cy="110" r="1.5"/><circle cx="230" cy="110" r="1.5"/><circle cx="350" cy="110" r="1.5"/><circle cx="470" cy="110" r="1.5"/><circle cx="590" cy="110" r="1.5"/>
    <circle cx="110" cy="230" r="1.5"/><circle cx="230" cy="230" r="1.5"/><circle cx="350" cy="230" r="1.5"/><circle cx="470" cy="230" r="1.5"/><circle cx="590" cy="230" r="1.5"/>
    <circle cx="110" cy="350" r="1.5"/><circle cx="230" cy="350" r="1.5"/><circle cx="350" cy="350" r="1.5"/><circle cx="470" cy="350" r="1.5"/><circle cx="590" cy="350" r="1.5"/>
    <circle cx="110" cy="470" r="1.5"/><circle cx="230" cy="470" r="1.5"/><circle cx="350" cy="470" r="1.5"/><circle cx="470" cy="470" r="1.5"/><circle cx="590" cy="470" r="1.5"/>
    <circle cx="110" cy="570" r="1.5"/><circle cx="230" cy="570" r="1.5"/><circle cx="350" cy="570" r="1.5"/><circle cx="470" cy="570" r="1.5"/><circle cx="590" cy="570" r="1.5"/>
  </g>

  <image
    href="https://images.unsplash.com/photo-1553877522-43269d4ea984?w=540&amp;h=630&amp;fit=crop&amp;crop=faces&amp;q=90"
    x="660" y="0" width="540" height="630"
    preserveAspectRatio="xMidYMin slice"
    clip-path="url(#photoClip)"
  />
  <rect x="660" y="0" width="540" height="630" fill="url(#fadeLeft)"/>
  <rect x="660" y="0" width="540" height="630" fill="url(#fadeBottom)"/>

  <g clip-path="url(#textClip)">
    <rect x="70" y="118" width="190" height="28" rx="14" fill="#0161EF" fill-opacity="0.18"/>
    <rect x="70" y="118" width="190" height="28" rx="14" fill="none" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.45"/>
    <text x="165" y="137" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="2.5" fill="#60a5fa" text-anchor="middle">TOOLS &amp; RESOURCES</text>

    <text x="70" y="234" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="70" font-weight="800" letter-spacing="-1.5" fill="#ffffff">YouTube</text>
    <text x="70" y="318" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="70" font-weight="800" letter-spacing="-1.5" fill="#ffffff">Video Ideas</text>
    <text x="70" y="402" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="70" font-weight="800" letter-spacing="-1.5" fill="url(#gradText)">Generators</text>

    <rect x="70" y="422" width="72" height="3" rx="1.5" fill="#3b82f6" fill-opacity="0.65"/>
    <text x="70" y="462" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="400" fill="rgba(229,236,246,0.55)">Best Tools for Businesses (2026)</text>
  </g>

  <text x="70" y="594" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.88)">SellOnTube</text>
  <text x="166" y="594" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="400" fill="rgba(229,236,246,0.32)">— YouTube Acquisition for B2B</text>
</svg>
