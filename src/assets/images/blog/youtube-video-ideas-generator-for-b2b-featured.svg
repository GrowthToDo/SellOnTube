<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="100%" height="675" role="img" aria-label="YouTube Video Ideas Generator for B2B — SellonTube">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#030620"/>
      <stop offset="100%" stop-color="#0a1540"/>
    </linearGradient>
    <linearGradient id="gradText" x1="300" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="135" x2="1200" y2="135"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="405" x2="1200" y2="405"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="240" y1="0" x2="240" y2="675"/>
    <line x1="480" y1="0" x2="480" y2="675"/>
    <line x1="720" y1="0" x2="720" y2="675"/>
    <line x1="960" y1="0" x2="960" y2="675"/>
  </g>

  <!-- Category pill -->
  <rect x="500" y="190" width="200" height="34" rx="17" fill="#60a5fa" fill-opacity="0.15" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.5"/>
  <text x="600" y="212" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#60a5fa" text-anchor="middle" letter-spacing="2">TOOLS &amp; STRATEGY</text>

  <!-- Title line 1 — white -->
  <text x="600" y="300" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="90" font-weight="800" fill="#ffffff" text-anchor="middle">YouTube Video Ideas</text>

  <!-- Title line 2 — gradient -->
  <text x="600" y="395" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="90" font-weight="800" fill="url(#gradText)" text-anchor="middle">Generator for B2B</text>

  <!-- Divider bar -->
  <rect x="480" y="425" width="240" height="3" rx="1.5" fill="url(#gradText)" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="600" y="468" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="400" fill="#94a3b8" text-anchor="middle">Buyer-intent topics for SaaS and service businesses</text>

  <!-- Footer wordmark -->
  <text x="600" y="640" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">SellOnTube<tspan font-weight="400" fill="#475569"> — YouTube Acquisition for B2B</tspan></text>
</svg>
